<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DevOps Journey</title>
    <script type="text/javascript">
      // Simple redirect for GitHub Pages subdirectory
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // If the path doesn't start with /devops-journey/, redirect to the subdirectory
      if (!path.startsWith('/devops-journey/') && path !== '/404.html') {
        // Remove leading slash if present
        var cleanPath = path.startsWith('/') ? path.slice(1) : path;
        // Redirect to the subdirectory
        window.location.replace('/devops-journey/' + cleanPath + search + hash);
      }
    </script>
  </head>
  <body>
  </body>
</html>
