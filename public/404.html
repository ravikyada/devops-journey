<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DevOps Journey</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect for subdirectory deployment
      var l = window.location;
      var path = l.pathname;

      // If accessing root domain paths, redirect to subdirectory
      if (path === '/' || (!path.startsWith('/devops-journey/') && path !== '/404.html')) {
        var redirectPath = path === '/' ? '' : path;
        l.replace('https://ravikyada.github.io/devops-journey/?/' + redirectPath.slice(1) + l.search + l.hash);
      }
    </script>
  </head>
  <body>
  </body>
</html>
